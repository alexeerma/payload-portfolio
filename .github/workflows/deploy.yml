name: Deploy to Zone.ee

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package
        env:
          NEXT_PUBLIC_SERVER_URL: https://alexeerma.ee
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          SMTP_HOST: smtp.zone.eu
        run: bash scripts/build-deploy.sh

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: /data05/virt114532/domeenid/www.alexeerma.ee/htdocs/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /data05/virt114532/domeenid/www.alexeerma.ee/htdocs
            tar -xzf deploy.tar.gz -C .
            pkill -f "node server.js" || true

name: Deploy to Zone.ee

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package
        env:
          NEXT_PUBLIC_SERVER_URL: https://alexeerma.ee
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          SMTP_HOST: smtp.zone.eu
        run: bash scripts/build-deploy.sh

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Debug SSH
        run: |
          ssh-add -l
          ssh -o StrictHostKeyChecking=no -v ${{ secrets.SSH_LOGIN_CREDS }} "echo connected" 2>&1 | tail -20

      - name: Upload to server
        run: |
          rsync -vrm -e "ssh -o StrictHostKeyChecking=no" deploy.tar.gz ${{ secrets.SSH_LOGIN_CREDS }}:/data05/virt114532/domeenid/www.alexeerma.ee/htdocs/

      - name: Extract and restart
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_LOGIN_CREDS }} "cd /data05/virt114532/domeenid/www.alexeerma.ee/htdocs && tar -xzf deploy.tar.gz -C . && pkill -f 'node server.js' || true"
